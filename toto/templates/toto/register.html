<body>
  <div
    style="display:flex; justify-content:center; align-items:center; padding-top:100px; padding-bottom:60px; min-height:100vh;">
    <div
      style="background:#fff; padding:40px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.15); width:100%; max-width:500px;">

      <h1 style="text-align:center; color:#e74c3c; margin-bottom:20px;">Become a Donor</h1>

      <form method="post" action="{% url 'register' %}" enctype="multipart/form-data">{%csrf_token%}
        <label for="firstname" style="display:block; margin-top:15px; font-weight:600;">First Name</label>
        <input type="text" id="firstName" name="firstname" required
          style="width:100%; padding:10px; margin-top:5px; border:1px solid #ccc; border-radius:6px;" />

          <label for="middlename" style="display:block; margin-top:15px; font-weight:600;">Middle Name</label>
        <input type="text" id="middlename" name="middlename" 
          style="width:100%; padding:10px; margin-top:5px; border:1px solid #ccc; border-radius:6px;" />

        <label for="lastname" style="display:block; margin-top:15px; font-weight:600;">Last Name</label>
        <input type="text" id="lastname" name="lastname" required
          style="width:100%; padding:10px; margin-top:5px; border:1px solid #ccc; border-radius:6px;" />

        <label for="gender" style="display:block; margin-top:15px; font-weight:600;">Gender</label>
        <select id="gender" name="gender" required
          style="width:100%; padding:10px; margin-top:5px; border:1px solid #ccc; border-radius:6px;">
          <option selected></option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>

        <label for="address" style="display:block; margin-top:15px; font-weight:600;">Address</label>
        <input type="text" id="address" name="address" required
          style="width:100%; padding:10px; margin-top:5px; border:1px solid #ccc; border-radius:6px;" />

        <label for="bloodgroup" style="display:block; margin-top:15px; font-weight:600;">Blood Group</label>
        <select id="bloodgroup" name="bloodgroup" required
          style="width:100%; padding:10px; margin-top:5px; border:1px solid #ccc; border-radius:6px;">
          <option selected></option>
          <option value="A+">A+</option>
          <option value="A-">A-</option>
          <option value="B+">B+</option>
          <option value="B-">B-</option>
          <option value="AB+">AB+</option>
          <option value="AB-">AB-</option>
          <option value="O+">O+</option>
          <option value="O-">O-</option>
        </select>
        <label for="phone" style="display:block; margin-top:15px; font-weight:600;">Phone Number</label>
        <input type="tel" id="phone" name="phone" required
          style="width:100%; padding:10px; margin-top:5px; border:1px solid #ccc; border-radius:6px;" />

        <label for="formFileLg" class="form-label" style="display:block; margin-top:15px; font-weight:600;">Upload Donor
          Card</label>
        <input class="form-control form-control-lg" id="formFileLg" type="file" name="image"
          style="width:100%; padding:10px; margin-top:5px; border:1px solid #ccc; border-radius:6px;" />

        <label for="email" style="display:block; margin-top:15px; font-weight:600;">Email</label>
        <input type="email" id="email" name="email" required
          style="width:100%; padding:10px; margin-top:5px; border:1px solid #ccc; border-radius:6px;" />

        <label for="password" style="display:block; margin-top:15px; font-weight:600;">Password</label>
        <input type="password" id="password" name="password" required
          style="width:100%; padding:10px; margin-top:5px; border:1px solid #ccc; border-radius:6px;" />

        <div class="form-check">
          <input class="form-check-input" type="checkbox" value="" id="checkDefault">
          <label class="form-check-label" for="checkDefault">
            I agree to the above terms and conditions.
          </label>
        </div>


        <button type="submit" data-bs-toggle="modal" data-bs-target="#exampleModal"
          style="width:100%; padding:12px; margin-top:25px; background-color:#e74c3c; color:white; font-size:16px; font-weight:bold; border:none; border-radius:6px; cursor:pointer;">Register</button>
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">Successfully Registered as Donor</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
            </div>
          </div>
      </form>


    </div>
  </div>
