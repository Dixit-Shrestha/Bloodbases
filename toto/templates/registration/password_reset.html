<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <title>Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f0f2f5]">
<nav class="navbar navbar-expand-lg navbar-danger bg-danger">
        <div class="container-fluid">
            <div class="fs-4 mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" fill="currentColor"
                    class="bi bi-heart-pulse-fill" viewBox="0 0 16 16">
                    <path
                        d="M1.475 9C2.702 10.84 4.779 12.871 8 15c3.221-2.129 5.298-4.16 6.525-6H12a.5.5 0 0 1-.464-.314l-1.457-3.642-1.598 5.593a.5.5 0 0 1-.945.049L5.889 6.568l-1.473 2.21A.5.5 0 0 1 4 9z">
                    </path>
                    <path
                        d="M.88 8C-2.427 1.68 4.41-2 7.823 1.143q.09.083.176.171a3 3 0 0 1 .176-.17C11.59-2 18.426 1.68 15.12 8h-2.783l-1.874-4.686a.5.5 0 0 0-.945.049L7.921 8.956 6.464 5.314a.5.5 0 0 0-.88-.091L3.732 8z">
                    </path>
                </svg>
                WELCOME
            </div>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class=" navbar" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <a class="nav-link text-white" href="index.html">Home</a>
                    <a class="nav-link active text-white" aria-current="page" href="#">Login</a>
                    <li class="nav-item">
                        <a class="nav-link active text-white" aria-current="page" href="signin.html">Signin</a>
                    </li>

                </ul>


            </div>
        </div>
    </nav>

  <div class="min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md bg-white rounded-md shadow-lg border border-gray-300">

      <div class="p-6">

        <h2 class="text-xl font-bold text-gray-900 mb-3">
          Find Your Account
        </h2>

        <p class="text-base text-gray-700 mb-5">
          Please enter your email address to search for your account.
        </p>

        <form method="POST" class="space-y-5">
          {% csrf_token %}

          <input type="email" name="email" id="email" required placeholder="Email address"
                 class="w-full px-4 py-3 border border-black rounded focus:outline-none focus:ring-1 focus:ring-[#1877f2] text-gray-900 text-base" />

          <div class="flex justify-end space-x-3">
            <a href="{% url 'login' %}"
               class="flex-1 py-2 rounded font-semibold text-base text-gray-700 bg-gray-200 hover:bg-gray-300 text-center transition">
              Cancel
            </a>
            <button type="submit"
                    class="flex-1 py-2 rounded font-semibold text-base text-white bg-[#1877f2] hover:bg-[#166fe5] transition">
              Send
            </button>
          </div>
        </form>

      </div>

    </div>

  </div>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
</body>
</html>
